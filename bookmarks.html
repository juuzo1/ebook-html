<script>
  const SUPABASE_URL = 'https://fkqzwvngyusyuczfakud.supabase.co';
  const SUPABASE_KEY = 'sb_publishable__TlWI8r-6Ym0V23nMAUCZg_LQTCXeb_';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  var __session = null;

  (async function() {
    try {
      const { data } = await sb.auth.getSession();
      if (!data.session) {
        window.location.replace('login.html');
        return;
      }
      const userData = await sb.auth.getUser();
      if (userData.data?.user) {
        __session = {
          id: userData.data.user.id,
          username: userData.data.user.user_metadata?.username || userData.data.user.email.split('@')[0],
          email: userData.data.user.email,
          role: userData.data.user.user_metadata?.role || 'user'
        };
      }
      document.documentElement.style.visibility = 'visible';
    } catch (e) {
      window.location.replace('login.html');
    }
  })();
</script>

  /* CARD */
  .card {

    overflow: hidden;
    transition: all var(--transition);

    cursor: pointer;
    border: 1px solid transparent;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 12px 32px rgba(74, 127, 255, 0.15);
  }
  .card-cover {

    background: var(--gold);
    border: none;
    border-radius: 50%;
    color: white;
    cursor: pointer;
    display: grid; place-items: center;
    transition: all var(--transition);

  }
  .bookmark-btn:hover {
    background: var(--danger);

  .card-overlay {

  }
</style>

<div class="controls">
  <input type="text" class="search-input" id="searchInput" placeholder="Tìm trong bookmark của bạn...">
  <select class="sort-select" id="sortSelect">
    <option value="recent">Mới lưu nhất</option>
    <option value="oldest">Cũ nhất</option>
    <option value="title">Tên A-Z</option>
  </select>
</div>

<section class="grid-section">
  <div class="meta-count">Tổng: <strong id="totalCount">0</strong> truyện đã lưu</div>
  <div id="content"></div>
</section>

<footer>
  <div class="footer-content">
    <div class="footer-links">
      <a href="#" target="_blank" id="footerTelegram">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
        Telegram
      </a>
      <a href="#" target="_blank" id="footerFacebook">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Facebook
      </a>
    </div>
    <div class="footer-copyright" id="footerCopyright">© 2016 — 2026 Trạm Đọc</div>
  </div>
</footer>

<!-- Confirm modal -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal">
    <h3 id="confirmTitle">Xóa bookmark?</h3>
    <p id="confirmMsg">Bạn có chắc chắn muốn xóa?</p>
    <div class="modal-buttons">
      <button class="btn btn-ghost" id="confirmNo">Hủy</button>
      <button class="btn btn-danger" id="confirmYes">Xóa</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastMsg">Đã lưu</span>
</div>

<script>
let bookmarkedStories = [];
let allGenres = [];
let displayed = [];
let currentPage = 1;
const PAGE_SIZE = 25;

function formatViews(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toString();
}

function formatRelativeDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs / 60000);
  const diffHr = Math.floor(diffMs / 3600000);
  const diffDay = Math.floor(diffMs / 86400000);
  if (diffMin < 1) return 'vừa xong';
  if (diffMin < 60) return `${diffMin} phút trước`;
  if (diffHr < 24) return `${diffHr} giờ trước`;
  if (diffDay < 30) return `${diffDay} ngày trước`;
  return d.toLocaleDateString('vi-VN');
}

async function loadData() {
  // Load genres for display
  const { data: genresData } = await sb.from('genres').select('*');
  allGenres = genresData || [];

  // Load bookmarks JOIN với stories
  const { data, error } = await sb
    .from('bookmarks')
    .select('id, created_at, story_id, stories(*)')
    .order('created_at', { ascending: false });

  if (error) {
    toast('Lỗi load bookmark: ' + error.message, 'danger');
    return;
  }

  // Flatten: mỗi bookmark có embedded "stories" object (1 truyện)
  bookmarkedStories = (data || [])
    .filter(b => b.stories)  // bỏ qua nếu truyện đã bị xóa
    .map(b => ({
      ...b.stories,
      bookmark_id: b.id,
      bookmarked_at: b.created_at
    }));

  document.getElementById('clearAllBtn').disabled = bookmarkedStories.length === 0;
  applyFilterAndRender();
}

function applyFilterAndRender(resetPage = true) {
  let list = bookmarkedStories;

  // Search
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (q) {
    list = list.filter(s => s.title.toLowerCase().includes(q));
  }

  // Sort
  const sort = document.getElementById('sortSelect').value;
  if (sort === 'recent') {
    list = [...list].sort((a, b) => new Date(b.bookmarked_at) - new Date(a.bookmarked_at));
  } else if (sort === 'oldest') {
    list = [...list].sort((a, b) => new Date(a.bookmarked_at) - new Date(b.bookmarked_at));
  } else if (sort === 'title') {
    list = [...list].sort((a, b) => a.title.localeCompare(b.title, 'vi'));
  }

  displayed = list;
  if (resetPage) currentPage = 1;
  document.getElementById('totalCount').textContent = list.length;
  renderGrid();
}

function renderGrid() {
  const container = document.getElementById('content');

  if (bookmarkedStories.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔖</div>
        <h3>Chưa có bookmark nào</h3>
        <p>Bấm vào icon bookmark (góc phải trên ảnh truyện) để lưu truyện bạn muốn đọc sau.</p>
        <a href="index.html">Khám phá truyện ngay →</a>
      </div>
    `;
    return;
  }

  if (displayed.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <h3>Không tìm thấy</h3>
        <p>Không có bookmark nào khớp với từ khóa tìm kiếm.</p>
      </div>
    `;
    return;
  }

  // Pagination
  const totalPages = Math.ceil(displayed.length / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = displayed.slice(start, start + PAGE_SIZE);

  const gridHTML = '<div class="grid">' + pageItems.map((s, i) => {
    const genre = allGenres.find(g => g.id === s.genre_id);
    return `
      <div class="card" style="animation-delay: ${Math.min(i, 15) * 0.03}s">
        <a href="${s.drive_link}" target="_blank" rel="noopener" class="card-cover" data-story-id="${s.id}">
          <img src="${s.cover_url}" alt="${s.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450/14141c/5a5a6e?text=No+Cover'">
          ${s.is_hot ? '<div class="card-badge hot">🔥 HOT</div>' : ''}
          ${s.is_completed ? '<div class="card-badge done">✓ FULL</div>' : ''}
          ${s.is_new ? '<div class="card-badge">NEW</div>' : ''}
          <div class="card-overlay">
            <span class="btn-watch">▶ Xem ngay</span>
          </div>
        </a>
        <button class="bookmark-btn active" data-story-id="${s.id}" title="Xóa khỏi bookmark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        </button>
        <div class="card-title">${s.title}</div>
        <div class="card-meta">
          <span>${genre ? genre.name : 'Khác'}</span>
          <span class="dot">•</span>
          <span>👁 ${formatViews(s.view_count)}</span>
        </div>
        <div class="bookmark-date">🔖 Lưu ${formatRelativeDate(s.bookmarked_at)}</div>
      </div>
    `;
  }).join('') + '</div>';

  // Pagination HTML
  let paginationHTML = '';
  if (totalPages > 1) {
    const pages = [];
    pages.push(1);
    if (currentPage > 3) pages.push('...');
    for (let i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) {
      pages.push(i);
    }
    if (currentPage < totalPages - 2) pages.push('...');
    if (totalPages > 1) pages.push(totalPages);

    paginationHTML = `<div class="pagination">`;
    paginationHTML += `<button class="page-btn" id="pagePrev" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
    pages.forEach(p => {
      if (p === '...') {
        paginationHTML += `<span class="page-ellipsis">…</span>`;
      } else {
        paginationHTML += `<button class="page-btn ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`;
      }
    });
    paginationHTML += `<button class="page-btn" id="pageNext" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;
    paginationHTML += `</div>`;
  }

  container.innerHTML = gridHTML + paginationHTML;

  // Bind events
  container.querySelectorAll('.card-cover[data-story-id]').forEach(link => {
    link.addEventListener('click', () => {
      const id = parseInt(link.dataset.storyId);
      sb.rpc('increment_view_count', { story_id_input: id }).then(() => {});
      sb.from('story_views').insert({ story_id: id }).then(() => {});
    });
  });

  container.querySelectorAll('.bookmark-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      const id = parseInt(btn.dataset.storyId);
      await removeBookmark(id);
    });
  });

  container.querySelectorAll('.page-btn[data-page]').forEach(btn => {
    btn.addEventListener('click', () => goToPage(parseInt(btn.dataset.page)));
  });
  document.getElementById('pagePrev')?.addEventListener('click', () => goToPage(currentPage - 1));
  document.getElementById('pageNext')?.addEventListener('click', () => goToPage(currentPage + 1));
}

function goToPage(p) {
  currentPage = p;
  renderGrid();
  document.querySelector('.grid-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function removeBookmark(storyId) {
  const { error } = await sb
    .from('bookmarks')
    .delete()
    .eq('user_id', __session.id)
    .eq('story_id', storyId);
  if (error) {
    toast('Lỗi: ' + error.message, 'danger');
    return;
  }
  bookmarkedStories = bookmarkedStories.filter(s => s.id !== storyId);
  document.getElementById('clearAllBtn').disabled = bookmarkedStories.length === 0;
  applyFilterAndRender();
  toast('Đã bỏ bookmark');
}

// Clear all bookmarks
document.getElementById('clearAllBtn').addEventListener('click', () => {
  if (bookmarkedStories.length === 0) return;
  document.getElementById('confirmTitle').textContent = 'Xóa tất cả bookmark?';
  document.getElementById('confirmMsg').textContent = `Bạn sẽ mất ${bookmarkedStories.length} truyện đã lưu. Hành động này không thể hoàn tác.`;
  document.getElementById('confirmModal').classList.add('show');
});

document.getElementById('confirmNo').addEventListener('click', () => {
  document.getElementById('confirmModal').classList.remove('show');
});

document.getElementById('confirmYes').addEventListener('click', async () => {
  const btn = document.getElementById('confirmYes');
  btn.disabled = true;
  const { error } = await sb
    .from('bookmarks')
    .delete()
    .eq('user_id', __session.id);
  btn.disabled = false;
  if (error) {
    toast('Lỗi: ' + error.message, 'danger');
    return;
  }
  bookmarkedStories = [];
  document.getElementById('clearAllBtn').disabled = true;
  document.getElementById('confirmModal').classList.remove('show');
  applyFilterAndRender();
  toast('Đã xóa tất cả bookmark');
});

// Click outside modal to close
document.getElementById('confirmModal').addEventListener('click', (e) => {
  if (e.target.id === 'confirmModal') {
    document.getElementById('confirmModal').classList.remove('show');
  }
});

function toast(msg, type) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = 'toast show' + (type === 'danger' ? ' danger' : '');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// SEARCH + SORT EVENTS
let searchTimer;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilterAndRender, 250);
});
document.getElementById('sortSelect').addEventListener('change', applyFilterAndRender);

// THEME
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;
let theme = localStorage.getItem('theme') || 'dark';
function applyTheme(t) {
  html.setAttribute('data-theme', t);
  document.getElementById('iconMoon').style.display = t === 'dark' ? 'block' : 'none';
  document.getElementById('iconSun').style.display = t === 'dark' ? 'none' : 'block';
  localStorage.setItem('theme', t);
}
applyTheme(theme);
themeToggle.addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme(theme);
});

// LOGOUT
document.getElementById('logoutLink').addEventListener('click', async (e) => {
  e.preventDefault();
  try { await sb.auth.signOut(); } catch (err) {}
  window.location.href = 'login.html';
});

// USER INFO
function renderUserInfo() {
  if (!__session) {
    setTimeout(renderUserInfo, 50);
    return;
  }
  document.getElementById('userName').textContent = __session.username || 'User';
  document.getElementById('userAvatar').textContent = (__session.username || 'U')[0].toUpperCase();
  if (__session.role === 'admin') {
    document.getElementById('adminLink').style.display = 'block';
  }
}
renderUserInfo();

// INIT
loadData();
loadFooterSettings();

async function loadFooterSettings() {
  const { data } = await sb.from('site_settings').select('*');
  if (!data) return;
  const s = {};
  data.forEach(r => { s[r.key] = r.value; });
  if (s.contact_telegram) document.getElementById('footerTelegram').href = s.contact_telegram;
  if (s.contact_facebook) document.getElementById('footerFacebook').href = s.contact_facebook;
  if (s.copyright) document.getElementById('footerCopyright').textContent = s.copyright;
  if (s.site_name) {
    document.querySelectorAll('.logo').forEach(el => {
      el.textContent = s.site_name;
    });
  }
}
</script>

</body>
