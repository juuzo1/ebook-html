<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" id="siteFavicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%234a7fff' rx='20'/%3E%3Ctext x='50' y='70' font-size='70' text-anchor='middle' fill='white' font-family='serif' font-weight='bold'%3ET%3C/text%3E%3C/svg%3E">
<script>
  // Set favicon từ localStorage NGAY khi load (không cần đợi Supabase)
  try {
    const cachedFaviconURL = localStorage.getItem('site_logo_url');
    if (cachedFaviconURL) {
      document.getElementById('siteFavicon').href = cachedFaviconURL;
    }
  } catch (e) {}
</script>
<title>Đăng Nhập — Trạm Đọc</title>
<!-- Supabase JS library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ===== SUPABASE CONFIG (nhúng trực tiếp) =====
  const SUPABASE_URL = 'https://fkqzwvngyusyuczfakud.supabase.co';
  const SUPABASE_KEY = 'sb_publishable__TlWI8r-6Ym0V23nMAUCZg_LQTCXeb_';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function signIn(email, password) {
    return await sb.auth.signInWithPassword({ email, password });
  }
  async function signOut() {
    await sb.auth.signOut();
  }
  async function getSession() {
    const { data } = await sb.auth.getSession();
    return data.session;
  }
  async function getCurrentUser() {
    const { data } = await sb.auth.getUser();
    if (!data || !data.user) return null;
    return {
      id: data.user.id,
      email: data.user.email,
      username: data.user.user_metadata?.username || data.user.email.split('@')[0],
      role: data.user.user_metadata?.role || 'user'
    };
  }

  // Nếu đã đăng nhập Supabase, chuyển thẳng vào index
  (async function() {
    try {
      const session = await getSession();
      if (session) {
        window.location.replace('index.html');
      }
    } catch (e) {}
  })();

  // Load favicon từ DB (logo upload bởi admin)
  (async function() {
    try {
      const { data } = await sb.from('site_settings').select('value').eq('key', 'logo_url').maybeSingle();
      if (data && data.value) {
        const fav = document.getElementById('siteFavicon');
        if (fav) fav.href = data.value;
        try { localStorage.setItem('site_logo_url', data.value); } catch (e) {}
      } else {
        try { localStorage.removeItem('site_logo_url'); } catch (e) {}
      }
    } catch (e) {}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg-deep: #0a0e1a;
    --bg-card: #131826;
    --bg-elevated: #1a2030;
    --border: #232a3d;
    --text-primary: #f0f3f8;
    --text-secondary: #98a1b3;
    --text-muted: #5a637a;
    --accent: #4a7fff;
    --accent-hover: #6b97ff;
    --accent-deep: #2952d1;
    --accent-glow: rgba(74, 127, 255, 0.4);
    --silver: #c8d2e3;
    --danger: #e94560;
    --hero-gradient: radial-gradient(ellipse at top left, rgba(74, 127, 255, 0.15) 0%, transparent 50%),
                     radial-gradient(ellipse at bottom right, rgba(200, 210, 227, 0.05) 0%, transparent 50%);
    --noise-opacity: 0.03;
    --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.5);
  }
  :root[data-theme="light"] {
    --bg-deep: #f4f6fb;
    --bg-card: #ffffff;
    --bg-elevated: #ffffff;
    --border: #dde3ef;
    --text-primary: #0a1428;
    --text-secondary: #4a5570;
    --text-muted: #8a93a8;
    --accent: #2952d1;
    --accent-hover: #1a3fb8;
    --accent-deep: #14318f;
    --accent-glow: rgba(41, 82, 209, 0.2);
    --silver: #5a6478;
    --danger: #d63757;
    --hero-gradient: radial-gradient(ellipse at top left, rgba(41, 82, 209, 0.1) 0%, transparent 50%),
                     radial-gradient(ellipse at bottom right, rgba(200, 210, 227, 0.15) 0%, transparent 50%);
    --noise-opacity: 0.015;
    --shadow-card: 0 20px 60px rgba(10, 20, 40, 0.12);
  }
  :root {
    --font-display: 'Lora', Georgia, serif;
    --font-body: 'Be Vietnam Pro', system-ui, sans-serif;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    background-image: var(--hero-gradient);
    transition: background-color var(--transition), color var(--transition);
    display: grid;
    place-items: center;
    padding: 2rem 1rem;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: var(--noise-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* Decorative floating books */
  .book-decor {
    position: fixed;
    pointer-events: none;
    opacity: 0.08;
    z-index: 1;
    font-family: var(--font-display);
    
    font-weight: 900;
    color: var(--accent);
    user-select: none;
  }
  .book-decor.b1 { top: 8%; left: 6%; font-size: 6rem; transform: rotate(-12deg); }
  .book-decor.b2 { bottom: 10%; right: 8%; font-size: 8rem; transform: rotate(15deg); }
  .book-decor.b3 { top: 50%; right: 5%; font-size: 4rem; transform: rotate(-25deg); }

  /* Theme toggle floating */
  .theme-toggle {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    display: grid;
    place-items: center;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all var(--transition);
    z-index: 10;
  }
  .theme-toggle:hover { color: var(--accent); border-color: var(--accent); }

  /* Login card */
  .login-wrap {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 420px;
  }

  .brand {
    text-align: center;
    margin-bottom: 2rem;
  }

  .logo {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 2.5rem;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent) 0%, var(--silver) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .logo i {  }

  .tagline {
    font-family: var(--font-display);
    
    color: var(--text-muted);
    font-size: 1rem;
  }

  .login-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    box-shadow: var(--shadow-card);
    backdrop-filter: blur(20px);
  }

  .login-header {
    text-align: center;
    margin-bottom: 1.75rem;
  }
  .login-title {
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
  }
  .login-sub {
    color: var(--text-secondary);
    font-size: 0.9rem;
  }

  /* Form */
  .form-group {
    margin-bottom: 1.1rem;
  }
  .form-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .input-wrap {
    position: relative;
  }
  .input-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }
  .form-input {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 0.9rem 1rem 0.9rem 2.8rem;
    border-radius: 12px;
    font-family: var(--font-body);
    font-size: 0.95rem;
    transition: all var(--transition);
  }
  .form-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .form-input::placeholder { color: var(--text-muted); }

  .toggle-password {
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0.25rem;
    transition: color var(--transition);
  }
  .toggle-password:hover { color: var(--accent); }

  /* Error message */
  .error-msg {
    color: var(--danger);
    font-size: 0.85rem;
    margin-top: 0.5rem;
    display: none;
    align-items: center;
    gap: 0.4rem;
  }
  .error-msg.show { display: flex; }

  /* Submit button */
  .btn-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    color: white;
    border: none;
    padding: 1rem;
    border-radius: 12px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all var(--transition);
    margin-top: 0.5rem;
    position: relative;
    overflow: hidden;
  }
  .btn-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px var(--accent-glow);
  }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* Spinner */
  .spinner {
    display: none;
    width: 18px;
    height: 18px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .btn-submit.loading .spinner { display: inline-block; }
  .btn-submit.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer note */
  .footer-note {
    text-align: center;
    margin-top: 1.5rem;
    color: var(--text-muted);
    font-size: 0.8rem;
    line-height: 1.6;
  }
  .footer-note .highlight {
    color: var(--text-secondary);
  }

  /* Demo hint */
  .demo-hint {
    margin-top: 1rem;
    padding: 0.85rem 1rem;
    background: var(--bg-elevated);
    border: 1px dashed var(--border);
    border-radius: 10px;
    text-align: center;
  }
  .demo-hint-title {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .demo-hint-creds {
    font-size: 0.9rem;
    color: var(--text-secondary);
  }
  .demo-hint-creds code {
    background: var(--bg-deep);
    color: var(--accent);
    padding: 0.2rem 0.5rem;
    border-radius: 6px;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 0.85rem;
    margin: 0 0.15rem;
  }

  /* Copyright */
  .copyright {
    text-align: center;
    margin-top: 2rem;
    color: var(--text-muted);
    font-size: 0.8rem;
  }

  /* Entrance animation */
  @keyframes float-in {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .login-wrap { animation: float-in 0.7s var(--transition); }

  @media (max-width: 480px) {
    .login-card { padding: 2rem 1.5rem; }
    .logo { font-size: 2rem; }
    .book-decor { display: none; }
  }

  /* ===== ROLE CHOICE MODAL ===== */
  .role-modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(12px);
    z-index: 100;
    place-items: center;
    padding: 1rem;
  }
  .role-modal-backdrop.show { display: grid; }

  .role-modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: var(--shadow-card);
    animation: float-in 0.4s var(--transition);
  }

  .role-check-icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(78, 205, 196, 0.15);
    color: #4ecdc4;
    display: grid;
    place-items: center;
    margin: 0 auto 1rem;
  }

  .role-modal h3 {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .role-modal p {
    color: var(--text-secondary);
    font-size: 0.95rem;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }
  .role-modal p strong {
    color: var(--accent);
  }

  .role-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .role-btn {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem;
    border-radius: 12px;
    text-decoration: none;
    transition: all var(--transition);
    text-align: left;
  }

  .role-btn-ghost {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-primary);
  }
  .role-btn-ghost:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .role-btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    border: 1px solid transparent;
    color: white;
  }
  .role-btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px var(--accent-glow);
  }

  .role-btn-icon {
    font-size: 1.5rem;
    flex-shrink: 0;
  }
  .role-btn-text {
    display: flex;
    flex-direction: column;
    line-height: 1.3;
  }
  .role-btn-text strong {
    font-size: 0.92rem;
    font-weight: 600;
  }
  .role-btn-text small {
    font-size: 0.75rem;
    opacity: 0.75;
    margin-top: 0.15rem;
  }

  @media (max-width: 480px) {
    .role-actions { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Decorative -->
<span class="book-decor b1">Aa</span>
<span class="book-decor b2">B</span>
<span class="book-decor b3">C</span>

<!-- Theme toggle -->
<button class="theme-toggle" id="themeToggle" aria-label="Sáng/Tối">
  <svg id="iconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <svg id="iconSun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
</button>

<!-- Login container -->
<main class="login-wrap">
  <div class="brand">
    <div class="logo">Trạm Đọc</div>
    <div class="tagline">— mở một chương truyện —</div>
  </div>

  <div class="login-card">
    <div class="login-header">
      <h1 class="login-title">Đăng Nhập</h1>
      <p class="login-sub">Vui lòng đăng nhập để tiếp tục</p>
    </div>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="username">Email</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input
            type="email"
            id="username"
            class="form-input"
            placeholder="email@example.com"
            required
            autocomplete="username"
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mật khẩu</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Nhập mật khẩu"
            required
            autocomplete="current-password"
          >
          <button type="button" class="toggle-password" id="togglePw" aria-label="Hiện/ẩn mật khẩu">
            <svg id="iconEye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="iconEyeOff" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <div class="error-msg" id="errorMsg">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="errorText">Tài khoản hoặc mật khẩu không đúng</span>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">Đăng nhập →</span>
        <span class="spinner"></span>
      </button>
    </form>

    <p class="footer-note">
      <span class="highlight">Lưu ý:</span> Tài khoản chỉ được cấp bởi quản trị viên.<br>
      Vui lòng liên hệ admin nếu chưa có tài khoản.
    </p>
  </div>

  <div class="copyright">© 2016 — 2026 Trạm Đọc</div>
</main>

<script>
// ===== THEME TOGGLE =====
const themeToggle = document.getElementById('themeToggle');
const iconMoon = document.getElementById('iconMoon');
const iconSun = document.getElementById('iconSun');
const html = document.documentElement;
let currentTheme = 'dark';

function applyTheme(t) {
  html.setAttribute('data-theme', t);
  iconMoon.style.display = t === 'dark' ? 'block' : 'none';
  iconSun.style.display = t === 'dark' ? 'none' : 'block';
}
applyTheme(currentTheme);

themeToggle.addEventListener('click', () => {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme(currentTheme);
});

// ===== PASSWORD TOGGLE =====
const togglePw = document.getElementById('togglePw');
const pwInput = document.getElementById('password');
const iconEye = document.getElementById('iconEye');
const iconEyeOff = document.getElementById('iconEyeOff');

togglePw.addEventListener('click', () => {
  const isHidden = pwInput.type === 'password';
  pwInput.type = isHidden ? 'text' : 'password';
  iconEye.style.display = isHidden ? 'none' : 'block';
  iconEyeOff.style.display = isHidden ? 'block' : 'none';
});

// ===== FORM SUBMIT (qua Supabase Auth) =====
const form = document.getElementById('loginForm');
const submitBtn = document.getElementById('submitBtn');
const errorMsg = document.getElementById('errorMsg');
const errorText = document.getElementById('errorText');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const emailInput = document.getElementById('username').value.trim();
  const password = pwInput.value;

  errorMsg.classList.remove('show');

  if (!emailInput || !password) {
    errorText.textContent = 'Vui lòng nhập đầy đủ thông tin';
    errorMsg.classList.add('show');
    return;
  }

  submitBtn.classList.add('loading');
  submitBtn.disabled = true;

  // Gọi Supabase Auth
  const { data, error } = await signIn(emailInput, password);

  if (error) {
    errorText.textContent = error.message.includes('Invalid')
      ? 'Email hoặc mật khẩu không đúng'
      : error.message;
    errorMsg.classList.add('show');
    submitBtn.classList.remove('loading');
    submitBtn.disabled = false;
    return;
  }

  // Login thành công → vào index
  window.location.href = 'index.html';
});

// Clear error khi user gõ lại
document.querySelectorAll('.form-input').forEach(input => {
  input.addEventListener('input', () => errorMsg.classList.remove('show'));
});
</script>

</body>
</html>
