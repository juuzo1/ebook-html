<script>
// ============= STATE =============
let allGenres = [];
let allStories = [];
let displayed = [];
let userBookmarks = new Set();
let currentGenreSlug = null;
let currentPage = 1;
const PAGE_SIZE = 25;

// Get genre from URL ?genre=slug
function getGenreFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('genre');
}

// Format view count
function formatViews(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toString();
}

// ============= LOAD DATA =============
async function loadData() {
  // Load genres
  const { data: genresData } = await sb
    .from('genres')
    .select('*')
    .order('display_order', { ascending: true });
  allGenres = genresData || [];

  // Load all stories
  const { data: storiesData } = await sb
    .from('stories')
    .select('*')
    .order('created_at', { ascending: false });
  allStories = storiesData || [];

  // Load user bookmarks
  if (__session) {
    const { data: bmData } = await sb
      .from('bookmarks')
      .select('story_id');
    userBookmarks = new Set((bmData || []).map(b => b.story_id));
  }

  // Determine current genre from URL
  currentGenreSlug = getGenreFromURL();

  renderGenreTabs();
  updatePageHeader();
  applyFilterAndRender();
}

// ============= GENRE TABS =============
function renderGenreTabs() {
  const container = document.getElementById('genreTabs');
  let html = `<a href="category.html" class="genre-tab ${!currentGenreSlug ? 'active' : ''}">📚 Tất cả</a>`;
  html += allGenres.map(g => {
    const active = g.slug === currentGenreSlug ? 'active' : '';
    return `<a href="category.html?genre=${g.slug}" class="genre-tab ${active}">${g.icon} ${g.name}</a>`;
  }).join('');
  container.innerHTML = html;
}

// ============= PAGE HEADER =============
function updatePageHeader() {
  const titleEl = document.getElementById('genreName');
  const iconEl = document.getElementById('genreIcon');
  const descEl = document.getElementById('genreDesc');
  const bcEl = document.getElementById('breadcrumbCurrent');

  if (!currentGenreSlug) {
    titleEl.textContent = 'Tất cả thể loại';
    iconEl.textContent = '📚';
    descEl.textContent = 'Khám phá toàn bộ truyện đang có trên Cổng Light Novel';
    bcEl.textContent = 'Tất cả thể loại';
    document.title = 'Tất cả thể loại — Cổng Light Novel';
  } else {
    const g = allGenres.find(x => x.slug === currentGenreSlug);
    if (g) {
      titleEl.textContent = g.name;
      iconEl.textContent = g.icon || '📚';
      descEl.textContent = `Khám phá các tác phẩm ${g.name.toLowerCase()} đặc sắc nhất`;
      bcEl.textContent = g.name;
      document.title = g.name + ' — Cổng Light Novel';
    } else {
      titleEl.textContent = 'Không tìm thấy thể loại';
      iconEl.textContent = '❓';
      descEl.textContent = '';
      bcEl.textContent = '?';
    }
  }
}

// ============= FILTER & RENDER =============
function applyFilterAndRender(resetPage = true) {
  let list = allStories;

  // Filter by genre
  if (currentGenreSlug) {
    const genre = allGenres.find(g => g.slug === currentGenreSlug);
    if (genre) {
      list = list.filter(s => s.genre_id === genre.id);
    }
  }

  // Filter by search
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (q) {
    list = list.filter(s => s.title.toLowerCase().includes(q));
  }

  // Sort
  const sort = document.getElementById('sortSelect').value;
  if (sort === 'newest') {
    list = [...list].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  } else if (sort === 'popular') {
    list = [...list].sort((a, b) => (b.view_count || 0) - (a.view_count || 0));
  } else if (sort === 'title') {
    list = [...list].sort((a, b) => a.title.localeCompare(b.title, 'vi'));
  }

  displayed = list;
  if (resetPage) currentPage = 1;
  document.getElementById('totalCount').textContent = list.length;
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('storyGrid');
  const paginationEl = document.getElementById('pagination');

  if (displayed.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📭</div>
        <h3>Chưa có truyện</h3>
        <p>Thể loại này chưa có truyện nào. Hãy quay lại sau!</p>
      </div>
    `;
    if (paginationEl) paginationEl.innerHTML = '';
    return;
  }

  // Pagination
  const totalPages = Math.ceil(displayed.length / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = displayed.slice(start, start + PAGE_SIZE);

  grid.innerHTML = pageItems.map((s, i) => {
    const genre = allGenres.find(g => g.id === s.genre_id);
    const bookmarked = userBookmarks.has(s.id);
    return `
      <div class="card" style="animation-delay: ${Math.min(i, 15) * 0.03}s">
        <a href="${s.drive_link}" target="_blank" rel="noopener" class="card-cover" data-story-id="${s.id}">
          <img src="${s.cover_url}" alt="${s.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450/14141c/5a5a6e?text=No+Cover'">
          ${s.is_hot ? '<div class="card-badge hot">🔥 HOT</div>' : ''}
          ${s.is_completed ? '<div class="card-badge done">✓ FULL</div>' : ''}
          ${s.is_new ? '<div class="card-badge">NEW</div>' : ''}
          <div class="card-overlay">
            <span class="btn-watch">▶ Xem ngay</span>
          </div>
        </a>
        <button class="bookmark-btn ${bookmarked ? 'active' : ''}" data-story-id="${s.id}" title="${bookmarked ? 'Bỏ bookmark' : 'Lưu bookmark'}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="${bookmarked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        </button>
        <div class="card-title">${s.title}</div>
        <div class="card-meta">
          <span>${genre ? genre.name : 'Khác'}</span>
          <span class="dot">•</span>
          <span>👁 ${formatViews(s.view_count)}</span>
        </div>
      </div>
    `;
  }).join('');

  // Bind click handlers
  grid.querySelectorAll('.card-cover[data-story-id]').forEach(link => {
    link.addEventListener('click', () => {
      const id = parseInt(link.dataset.storyId);
      sb.rpc('increment_view_count', { story_id_input: id }).then(() => {});
      sb.from('story_views').insert({ story_id: id }).then(() => {});
    });
  });

  grid.querySelectorAll('.bookmark-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      const id = parseInt(btn.dataset.storyId);
      await toggleBookmark(id, btn);
    });
  });

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (!el) return;
  if (totalPages <= 1) {
    el.innerHTML = '';
    return;
  }

  // Tính các trang cần hiển thị: 1, ..., prev, current, next, ..., last
  const pages = [];
  pages.push(1);
  if (currentPage > 3) pages.push('...');
  for (let i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) {
    pages.push(i);
  }
  if (currentPage < totalPages - 2) pages.push('...');
  if (totalPages > 1) pages.push(totalPages);

  let html = `<button class="page-btn" id="pagePrev" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
  pages.forEach(p => {
    if (p === '...') {
      html += `<span class="page-ellipsis">…</span>`;
    } else {
      html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`;
    }
  });
  html += `<button class="page-btn" id="pageNext" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;
  el.innerHTML = html;

  // Bind events
  el.querySelectorAll('.page-btn[data-page]').forEach(btn => {
    btn.addEventListener('click', () => goToPage(parseInt(btn.dataset.page)));
  });
  document.getElementById('pagePrev')?.addEventListener('click', () => goToPage(currentPage - 1));
  document.getElementById('pageNext')?.addEventListener('click', () => goToPage(currentPage + 1));
}

function goToPage(p) {
  currentPage = p;
  renderGrid();
  // Scroll lên đầu grid khi đổi trang
  document.querySelector('.grid-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ============= BOOKMARK =============
async function toggleBookmark(storyId, btn) {
  if (!__session) {
    toast('Vui lòng đăng nhập', 'danger');
    return;
  }

  const isBookmarked = userBookmarks.has(storyId);
  btn.disabled = true;

  try {
    if (isBookmarked) {
      // Xóa bookmark
      const { error } = await sb
        .from('bookmarks')
        .delete()
        .eq('user_id', __session.id)
        .eq('story_id', storyId);
      if (error) throw error;
      userBookmarks.delete(storyId);
      btn.classList.remove('active');
      btn.querySelector('svg').setAttribute('fill', 'none');
      btn.title = 'Lưu bookmark';
      toast('Đã bỏ bookmark');
    } else {
      // Thêm bookmark
      const { error } = await sb
        .from('bookmarks')
        .insert({ user_id: __session.id, story_id: storyId });
      if (error) throw error;
      userBookmarks.add(storyId);
      btn.classList.add('active');
      btn.querySelector('svg').setAttribute('fill', 'currentColor');
      btn.title = 'Bỏ bookmark';
      toast('Đã lưu bookmark');
    }
  } catch (err) {
    toast('Lỗi: ' + err.message, 'danger');
  }
  btn.disabled = false;
}

// ============= TOAST =============
function toast(msg, type) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = 'toast show' + (type === 'danger' ? ' danger' : '');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============= EVENTS =============
let searchTimer;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilterAndRender, 250);
});

document.getElementById('sortSelect').addEventListener('change', applyFilterAndRender);

// THEME
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;
let theme = localStorage.getItem('theme') || 'dark';
function applyTheme(t) {
  html.setAttribute('data-theme', t);
  document.getElementById('iconMoon').style.display = t === 'dark' ? 'block' : 'none';
  document.getElementById('iconSun').style.display = t === 'dark' ? 'none' : 'block';
  localStorage.setItem('theme', t);
}
applyTheme(theme);
themeToggle.addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme(theme);
});

// LOGOUT
document.getElementById('logoutLink').addEventListener('click', async (e) => {
  e.preventDefault();
  try { await sb.auth.signOut(); } catch (err) {}
  window.location.href = 'login.html';
});

// USER INFO + ADMIN LINK
function renderUserInfo() {
  if (!__session) {
    setTimeout(renderUserInfo, 50);
    return;
  }
  document.getElementById('userName').textContent = __session.username || 'User';
  document.getElementById('userAvatar').textContent = (__session.username || 'U')[0].toUpperCase();
  if (__session.role === 'admin') {
    document.getElementById('adminLink').style.display = 'block';
  }
}
renderUserInfo();

// INIT
loadData();
</script>
